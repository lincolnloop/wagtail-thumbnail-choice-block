name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 1"

jobs:
  test:
    name: test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: py310
            python-version: "3.10"
            django-version: "4.2.*"
            wagtail-version: "5.2.*"
          - name: py311
            python-version: "3.11"
            django-version: "5.0.*"
            wagtail-version: "6.4.*"
          - name: py312
            python-version: "3.12"
            django-version: "5.1.*"
            wagtail-version: "7.0.*"
          - name: py313
            python-version: "3.13"
            django-version: "5.2.*"
            wagtail-version: "7.4.*"
          - name: py314
            python-version: "3.14"
            django-version: "6.0.*"
            wagtail-version: "7.4.*"
          - name: latest-release
            python-version: "3.14"
            django-version: ""      # unpinned: resolves to newest on PyPI
            wagtail-version: ""     # unpinned: resolves to newest on PyPI
            allow-failure: true
          - name: django-main
            python-version: "3.14"
            django-version: "main"
            wagtail-version: "7.4.*"
            allow-failure: true
          - name: wagtail-main
            python-version: "3.14"
            django-version: "6.0.*"
            wagtail-version: "main"
            allow-failure: true

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.21"

      - name: Run tests (${{ matrix.name }})
        continue-on-error: ${{ matrix.allow-failure == true }}
        run: |
          WITH_ARGS=()
          if [ "${{ matrix.django-version }}" = "main" ]; then
            WITH_ARGS+=(--with "Django @ git+https://github.com/django/django.git")
          elif [ -n "${{ matrix.django-version }}" ]; then
            WITH_ARGS+=(--with "Django==${{ matrix.django-version }}")
          fi
          if [ "${{ matrix.wagtail-version }}" = "main" ]; then
            WITH_ARGS+=(--with "wagtail @ git+https://github.com/wagtail/wagtail.git")
          elif [ -n "${{ matrix.wagtail-version }}" ]; then
            WITH_ARGS+=(--with "wagtail==${{ matrix.wagtail-version }}")
          fi
          uv run --python ${{ matrix.python-version }} \
            "${WITH_ARGS[@]}" \
            --extra test --extra accessibility \
            pytest

  lint:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format
        run: ruff format --check .
